<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio de Sesión - Diagrama de Servidores</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login-styles.css">
  <link rel="icon" type="image/jpeg" href="/favicon.jpg">
</head>

<body>
  <div class="login-container">
    <div class="login-box">
      <!-- Logo/Header -->
      <div class="login-header">
        <div class="logo">
          <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="3" width="8" height="18" rx="1" stroke="currentColor" stroke-width="2" fill="none" />
            <rect x="14" y="3" width="8" height="18" rx="1" stroke="currentColor" stroke-width="2" fill="none" />
            <line x1="4" y1="7" x2="8" y2="7" stroke="currentColor" stroke-width="2" />
            <line x1="4" y1="11" x2="8" y2="11" stroke="currentColor" stroke-width="2" />
            <line x1="4" y1="15" x2="8" y2="15" stroke="currentColor" stroke-width="2" />
            <line x1="16" y1="7" x2="20" y2="7" stroke="currentColor" stroke-width="2" />
            <line x1="16" y1="11" x2="20" y2="11" stroke="currentColor" stroke-width="2" />
            <line x1="16" y1="15" x2="20" y2="15" stroke="currentColor" stroke-width="2" />
          </svg>
        </div>
        <h1>Diagrama de Servidores</h1>
        <p class="subtitle">Grupo Danec - Sistema de Gestión</p>
      </div>

      <!-- Formulario de Login -->
      <form id="loginForm" class="login-form">
        <div id="errorMessage" class="error-message" style="display: none;"></div>

        <div class="form-group">
          <label for="username">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12Z"
                stroke="currentColor" stroke-width="2" />
              <path d="M2 22C2 17.5817 5.58172 14 10 14H14C18.4183 14 22 17.5817 22 22" stroke="currentColor"
                stroke-width="2" />
            </svg>
            Usuario
          </label>
          <input type="text" id="username" name="username" placeholder="Ingresa tu usuario" required
            autocomplete="username" autofocus>
        </div>

        <div class="form-group">
          <label for="password">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="5" y="11" width="14" height="11" rx="2" stroke="currentColor" stroke-width="2" />
              <path d="M7 11V7C7 4.23858 9.23858 2 12 2C14.7614 2 17 4.23858 17 7V11" stroke="currentColor"
                stroke-width="2" />
              <circle cx="12" cy="16" r="1.5" fill="currentColor" />
            </svg>
            Contraseña
          </label>
          <div class="password-wrapper" style="position:relative">
            <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required
              autocomplete="current-password">
            <button type="button" id="togglePassword" aria-label="Mostrar contraseña"
              style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#94a3b8;padding:4px;display:flex;align-items:center">
              <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">
          <span id="btnText">Iniciar Sesión</span>
          <span id="btnLoader" class="loader" style="display: none;"></span>
        </button>
      </form>

      <!-- Footer -->
      <div class="login-footer">
        <p>&copy; 2026 Grupo Danec. Todos los derechos reservados.</p>
        <p class="help-text">¿Problemas para iniciar sesión? Contacta al administrador del sistema.</p>
      </div>
    </div>

    <!-- Información adicional (opcional) -->
    <div class="info-box">
      <h3>🔒 Acceso Seguro</h3>
      <ul>
        <li>✓ Conexión cifrada</li>
        <li>✓ Autenticación requerida</li>
        <li>✓ Sesión automática</li>
      </ul>
      <div class="network-status">
        <span id="networkStatus"></span>
      </div>
    </div>
  </div>

  <script>
    // Password visibility toggle
    document.getElementById('togglePassword').addEventListener('click', () => {
      const pwd = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        pwd.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    });

    // Manejo del formulario de login
    const loginForm = document.getElementById('loginForm');
    const btnLogin = document.getElementById('btnLogin');
    const btnText = document.getElementById('btnText');
    const btnLoader = document.getElementById('btnLoader');
    const errorMessage = document.getElementById('errorMessage');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Deshabilitar botón y mostrar loader
      btnLogin.disabled = true;
      btnText.style.display = 'none';
      btnLoader.style.display = 'inline-block';
      errorMessage.style.display = 'none';

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.success) {
          // Login exitoso - redirigir a home
          window.location.href = '/';
        } else {
          // Login fallido - mostrar error
          showError(data.message || 'Usuario o contraseña incorrectos');
        }
      } catch (error) {
        showError('Error de conexión. Verifica tu red e intenta nuevamente.');
      } finally {
        // Re-habilitar botón
        btnLogin.disabled = false;
        btnText.style.display = 'inline';
        btnLoader.style.display = 'none';
      }
    });

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.style.display = 'block';

      // Animar el error
      errorMessage.style.animation = 'none';
      setTimeout(() => {
        errorMessage.style.animation = 'shake 0.5s';
      }, 10);
    }

    // Verificar estado de red (opcional)
    async function checkNetworkStatus() {
      const networkStatus = document.getElementById('networkStatus');

      try {
        const response = await fetch('/api/meta');
        if (response.ok) {
          networkStatus.innerHTML = '🟢 Servidor en línea';
          networkStatus.className = 'status-online';
        } else {
          networkStatus.innerHTML = '🟡 Servidor en mantenimiento';
          networkStatus.className = 'status-warning';
        }
      } catch (error) {
        networkStatus.innerHTML = '🔴 Sin conexión al servidor';
        networkStatus.className = 'status-offline';
      }
    }

    // Verificar estado al cargar
    checkNetworkStatus();
    setInterval(checkNetworkStatus, 30000); // Cada 30 segundos
  </script>
</body>

</html>
