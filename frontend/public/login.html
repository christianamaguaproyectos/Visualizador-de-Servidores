<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio de Sesión - Diagrama de Servidores</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="login-styles.css">
  <link rel="icon" type="image/jpeg" href="/favicon.jpg">
</head>

<body>
  <div class="light-flow" aria-hidden="true"></div>
  <div class="light-orb orb-1" aria-hidden="true"></div>
  <div class="light-orb orb-2" aria-hidden="true"></div>

  <main class="login-scene">
    <section class="glass-panel" aria-label="Panel principal de acceso">
      <div class="glass-reflection" aria-hidden="true"></div>

      <div class="panel-left">
        <div class="login-header">
          <div class="brand-row">
            <div class="logo" aria-hidden="true">
              <svg width="120" height="150" viewBox="0 0 120 150" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <linearGradient id="rackGradient" x1="7" y1="8" x2="67" y2="66" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#7AB3FF" />
                    <stop offset="1" stop-color="#6D5EFF" />
                  </linearGradient>
                  <linearGradient id="rackBg" x1="0" y1="0" x2="1" y2="1">
                    <stop stop-color="#B6DDFF" stop-opacity="0.2" />
                    <stop offset="1" stop-color="#8A7BFF" stop-opacity="0.06" />
                  </linearGradient>
                </defs>

                <rect x="16" y="10" width="38" height="52" rx="8" fill="url(#rackBg)" stroke="url(#rackGradient)" stroke-width="2" />
                <rect x="64" y="10" width="38" height="52" rx="8" fill="url(#rackBg)" stroke="url(#rackGradient)" stroke-width="2" />
                <rect x="16" y="88" width="38" height="52" rx="8" fill="url(#rackBg)" stroke="url(#rackGradient)" stroke-width="2" />
                <rect x="64" y="88" width="38" height="52" rx="8" fill="url(#rackBg)" stroke="url(#rackGradient)" stroke-width="2" />

                <path d="M34 62V88M83 62V88M34 75H83" stroke="url(#rackGradient)" stroke-width="2.2" stroke-linecap="round" />

                <path d="M25 24H45M25 32H45M25 40H39M73 24H93M73 32H93M73 40H87" stroke="url(#rackGradient)" stroke-width="2.5" stroke-linecap="round" />
                <path d="M25 102H45M25 110H45M25 118H39M73 102H93M73 110H93M73 118H87" stroke="url(#rackGradient)" stroke-width="2.5" stroke-linecap="round" />
              </svg>
            </div>

            <div class="brand-copy">
              <h1>Diagrama de Servidores</h1>
              <p class="subtitle">Grupo Dence - Sistema de Gestión</p>
            </div>
          </div>
        </div>

        <form id="loginForm" class="login-form">
          <div id="errorMessage" class="error-message" style="display: none;"></div>

          <div class="form-group">
            <label for="username" class="field-label">
              <span class="field-icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12Z"
                    stroke="currentColor" stroke-width="1.8" />
                  <path d="M4 21C4 17.6863 6.68629 15 10 15H14C17.3137 15 20 17.6863 20 21" stroke="currentColor"
                    stroke-width="1.8" stroke-linecap="round" />
                </svg>
              </span>
              Usuario
            </label>
            <div class="input-shell">
              <input type="text" id="username" name="username" placeholder="Ingresa tu usuario" required
                autocomplete="username" autofocus>
            </div>
          </div>

          <div class="form-group">
            <label for="password" class="field-label">
              <span class="field-icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect x="4.75" y="10.2" width="14.5" height="10.8" rx="2.4" stroke="currentColor" stroke-width="1.8" />
                  <path d="M8 10.2V6.8C8 4.14903 10.149 2 12.8 2C15.451 2 17.6 4.14903 17.6 6.8V10.2"
                    stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                  <circle cx="12" cy="15.5" r="1.2" fill="currentColor" />
                </svg>
              </span>
              Contraseña
            </label>
            <div class="input-shell password-shell">
              <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required
                autocomplete="current-password">
              <button type="button" id="togglePassword" class="toggle-password" aria-label="Mostrar contraseña">
                <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M2 12s3.8-7 10-7 10 7 10 7-3.8 7-10 7-10-7-10-7z" />
                  <circle cx="12" cy="12" r="2.8" />
                </svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-login" id="btnLogin">
            <span id="btnText">Iniciar Sesión</span>
            <span id="btnLoader" class="loader" style="display: none;"></span>
          </button>

          <button type="button" id="guestLogin" class="btn-guest btn-guest-inline">Iniciar sesión de invitado</button>

          <p id="networkStatus" class="network-inline-status" aria-live="polite"></p>
        </form>

        <div class="login-footer">
          <p>&copy; 2020 Grupo Danec. Todos los derechos reservados.</p>
          <p class="help-text">¿Problemas para iniciar sesión? Contacta al administrador del sistema.</p>
        </div>
      </div>
    </section>
  </main>
  <div class="corner-star" aria-hidden="true">✦</div>

  <script>
    // Password visibility toggle
    document.getElementById('togglePassword').addEventListener('click', () => {
      const pwd = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.innerHTML = '<path d="M3 3L21 21"/><path d="M10.55 10.56A2.5 2.5 0 0014 14"/><path d="M9.9 5.2C10.58 5.07 11.28 5 12 5c6.2 0 10 7 10 7a19.29 19.29 0 01-3.03 3.85"/><path d="M6.1 6.13C3.76 7.86 2 12 2 12s3.8 7 10 7c1.95 0 3.62-.57 5.03-1.42"/>';
      } else {
        pwd.type = 'password';
        icon.innerHTML = '<path d="M2 12s3.8-7 10-7 10 7 10 7-3.8 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="2.8"/>';
      }
    });

    // Acceso asistido para invitado (no inicia sesión automáticamente)
    document.getElementById('guestLogin').addEventListener('click', () => {
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const errorMessage = document.getElementById('errorMessage');

      usernameInput.value = 'invitado';
      passwordInput.focus();
      errorMessage.style.display = 'none';
    });

    // Manejo del formulario de login
    const loginForm = document.getElementById('loginForm');
    const btnLogin = document.getElementById('btnLogin');
    const btnText = document.getElementById('btnText');
    const btnLoader = document.getElementById('btnLoader');
    const errorMessage = document.getElementById('errorMessage');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Deshabilitar botón y mostrar loader
      btnLogin.disabled = true;
      btnText.style.display = 'none';
      btnLoader.style.display = 'inline-block';
      errorMessage.style.display = 'none';

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.success) {
          // Login exitoso - redirigir a home
          window.location.href = '/';
        } else {
          // Login fallido - mostrar error
          showError(data.message || 'Usuario o contraseña incorrectos');
        }
      } catch (error) {
        showError('Error de conexión. Verifica tu red e intenta nuevamente.');
      } finally {
        // Re-habilitar botón
        btnLogin.disabled = false;
        btnText.style.display = 'inline';
        btnLoader.style.display = 'none';
      }
    });

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.style.display = 'block';

      // Animar el error
      errorMessage.style.animation = 'none';
      setTimeout(() => {
        errorMessage.style.animation = 'shake 0.5s';
      }, 10);
    }

    // Verificar estado de red (opcional)
    async function checkNetworkStatus() {
      const networkStatus = document.getElementById('networkStatus');
      if (!networkStatus) {
        return;
      }

      networkStatus.classList.remove('status-online', 'status-warning', 'status-offline');

      try {
        const response = await fetch('/api/meta');
        if (response.ok) {
          networkStatus.textContent = 'Servidor en línea';
          networkStatus.classList.add('status-online');
        } else {
          networkStatus.textContent = 'Servidor en mantenimiento';
          networkStatus.classList.add('status-warning');
        }
      } catch (error) {
        networkStatus.textContent = 'Sin conexión al servidor';
        networkStatus.classList.add('status-offline');
      }
    }

    // Verificar estado al cargar
    checkNetworkStatus();
    setInterval(checkNetworkStatus, 30000); // Cada 30 segundos
  </script>
</body>

</html>
